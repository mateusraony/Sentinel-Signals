name: Scheduled scan

on:
  # Low-frequency fallback only — the primary 5-min cadence is driven by an
  # external dispatch calling workflow_dispatch directly (see
  # docs/claude/external-cron-setup.md and docs/known-risks.md item 18):
  # measured over 48h, this schedule: trigger alone averaged ~100min between
  # runs (worst case ~3h26) instead of the 5min configured here — GitHub's
  # documented schedule-queue drift under load, not a bug in this workflow.
  # Keeping this at */5 too (instead of hourly) would double real passes/day
  # once the external dispatch is reliable, silently pushing Firestore usage
  # past the PASSES_PER_DAY estimate in scanner.js — see that constant's
  # comment for the corresponding math.
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

concurrency:
  group: scheduled-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run scan
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HEALTHCHECKS_PING_URL: ${{ secrets.HEALTHCHECKS_PING_URL }}
