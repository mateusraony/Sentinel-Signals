name: Golden fixture (candles reais)

# Congela candles reais da Binance SPOT como fixture dos golden tests
# (src/lib/indicators/goldenParity.test.js, bloco "fixtures reais congeladas").
# Roda no runner do GitHub porque data-api.binance.vision funciona de lá (é a
# mesma API que o scan 24/7 usa) — a rede das sessões do Claude Code bloqueia
# a Binance, e o plano Essential do TradingView não exporta CSV (ver
# docs/claude/golden-tv-export.md).
#
# Disparo MANUAL (Actions → "Golden fixture (candles reais)" → Run workflow).
# O job cria uma branch, commita os JSONs e ABRE UM PR sozinho — os golden
# tests do CI validam os candles reais antes do merge. Não regravar sem
# motivo: fixture é congelada de propósito (teste determinístico e offline).
on:
  workflow_dispatch:
    inputs:
      symbol:
        description: "Par (Binance Spot)"
        default: "BTCUSDT"
        required: true
      intervals:
        description: "Timeframes separados por espaço"
        default: "4h 1h"
        required: true
      limit:
        description: "Quantidade de candles"
        default: "500"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      # O script usa só APIs nativas do Node (fetch/fs/path) — sem npm ci.
      # Inputs passam por env: (nunca interpolados direto no script) — evita
      # script injection num job com contents/pull-requests: write, conforme o
      # guia de security hardening do GitHub Actions.
      - name: Baixar e congelar candles fechados
        env:
          SYMBOL: ${{ inputs.symbol }}
          INTERVALS: ${{ inputs.intervals }}
          LIMIT: ${{ inputs.limit }}
        run: |
          for tf in $INTERVALS; do
            node scripts/fetch-golden-fixture.mjs "$SYMBOL" "$tf" "$LIMIT"
          done

      - name: Commitar em branch própria e abrir PR
        env:
          GH_TOKEN: ${{ github.token }}
          SYMBOL: ${{ inputs.symbol }}
          INTERVALS: ${{ inputs.intervals }}
          RUN_ID: ${{ github.run_id }}
        run: |
          git config user.name "sentinel-signals-bot"
          git config user.email "actions@users.noreply.github.com"

          BRANCH="golden-fixture/${SYMBOL}-${RUN_ID}"
          git checkout -b "$BRANCH"
          git add src/lib/indicators/__fixtures__/golden/*.json
          if git diff --cached --quiet; then
            echo "Nada novo para commitar (fixtures idênticas)."
            exit 0
          fi
          git commit -m "chore(parity): congelar fixture golden ${SYMBOL} (${INTERVALS})"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Fixture golden: candles reais ${SYMBOL} (${INTERVALS})" \
            --body "Candles FECHADOS da Binance Spot congelados pelo workflow golden-fixture.yml (run ${RUN_ID}). O bloco \"fixtures reais congeladas (Binance JSON)\" de goldenParity.test.js valida estes candles no CI deste PR — se o check build passar, a matemática dos indicadores confere em dados reais de mercado."
