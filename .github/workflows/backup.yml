name: Daily Firestore backup

# Backup gratuito e compatível com o plano Spark (o export oficial do
# Firestore exige um bucket do Cloud Storage, que por sua vez exige o plano
# pago Blaze — não é opção aqui, ver docs/known-risks.md item 14). Gera um
# snapshot JSON das coleções de negócio e publica na branch `backups` de um
# repositório PRIVADO separado (mateusraony/sentinel-signals-backups),
# mantendo os últimos 30 dias. Restauração é manual, ver
# docs/restore-firestore.md (ajustar a origem do clone para o repo privado).
#
# Histórico (ver docs/known-risks.md item 25): até 2026-07-18 publicava
# direto na branch `backups` DESTE repositório, que é público — vazando
# dados de negócio reais (sinais/operações/config de estratégia) por pelo
# menos 4 dias antes de ser percebido. O `schedule` foi removido então para
# parar novos vazamentos. Corrigido: destino trocado para o repositório
# privado acima via `BACKUP_REPO_TOKEN` (fine-grained PAT, Contents: write,
# restrito só a esse repo — nunca com acesso a este repositório).
# `schedule` só volta depois de uma execução manual bem-sucedida confirmar
# que o token/repo novo funcionam de ponta a ponta.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Gerar snapshot
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          node scripts/backup-firestore.mjs "/tmp/backup-${DATE}.json"
          echo "BACKUP_DATE=${DATE}" >> "$GITHUB_ENV"

      - name: Diagnóstico do token (temporário — remover depois que o backup funcionar)
        env:
          BACKUP_REPO_TOKEN: ${{ secrets.BACKUP_REPO_TOKEN }}
        run: |
          echo "Tamanho do BACKUP_REPO_TOKEN: ${#BACKUP_REPO_TOKEN} caracteres"
          if [ -z "$BACKUP_REPO_TOKEN" ]; then
            echo "::error::BACKUP_REPO_TOKEN está vazio — o secret não existe neste repositório ou o nome não é exatamente 'BACKUP_REPO_TOKEN'"
          fi
          echo "Testando acesso isolado ao repositório (git ls-remote)..."
          git ls-remote "https://x-access-token:${BACKUP_REPO_TOKEN}@github.com/mateusraony/sentinel-signals-backups.git" && echo "ACESSO OK" || echo "ACESSO FALHOU"

      - name: Publicar na branch backups (repo privado)
        env:
          BACKUP_REPO_TOKEN: ${{ secrets.BACKUP_REPO_TOKEN }}
        run: |
          git config user.name "sentinel-signals-bot"
          git config user.email "actions@users.noreply.github.com"

          git remote add backup-repo "https://x-access-token:${BACKUP_REPO_TOKEN}@github.com/mateusraony/sentinel-signals-backups.git"

          git fetch backup-repo backups || true
          if git show-ref --verify --quiet refs/remotes/backup-repo/backups; then
            git checkout -B backups backup-repo/backups
          else
            git checkout --orphan backups
            git rm -rf . >/dev/null 2>&1 || true
          fi

          cp "/tmp/backup-${BACKUP_DATE}.json" "./backup-${BACKUP_DATE}.json"
          git add "backup-${BACKUP_DATE}.json"
          git commit -m "Backup ${BACKUP_DATE}" --allow-empty

          # Mantém só os últimos 30 snapshots diários
          ls -1 backup-*.json 2>/dev/null | sort | head -n -30 | xargs -r git rm -q --ignore-unmatch
          git diff --cached --quiet || git commit -m "Remove backups antigos (mantém últimos 30)"

          git push backup-repo backups
