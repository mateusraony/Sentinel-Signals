services:
  - type: web
    runtime: static
    name: sentinel-signals
    branch: main
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_FIREBASE_API_KEY
        value: AIzaSyAjBZlR_r69qAkyPq2Ww0JBaY7F9HSdhpc
      - key: VITE_FIREBASE_AUTH_DOMAIN
        value: sentinel-signals.firebaseapp.com
      - key: VITE_FIREBASE_PROJECT_ID
        value: sentinel-signals
      - key: VITE_FIREBASE_STORAGE_BUCKET
        value: sentinel-signals.firebasestorage.app
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        value: "9439557541"
      - key: VITE_FIREBASE_APP_ID
        value: "1:9439557541:web:f92e49ade6d2e69f0dda4c"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # sentinel-signals-api: real webhook receiver for the TradingView Pine
  # Script (POST /webhook/tradingview) — logs/notifies only, never places
  # orders (see docs/known-risks.md). Also hosts /api/telegram-notify
  # (unused by the browser today — Telegram is configured client-side, see
  # TelegramSettings.jsx — kept for when that changes) and /health.
  # Secrets below (sync: false) must be set manually in the Render
  # dashboard; they are never committed here.
  - type: web
    runtime: node
    name: sentinel-signals-api
    branch: main
    rootDir: server
    buildCommand: npm ci
    startCommand: node index.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: ALLOWED_ORIGIN
        value: https://sentinel-signals.onrender.com
