services:
  - type: web
    runtime: static
    name: sentinel-signals
    branch: main
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_FIREBASE_API_KEY
        value: AIzaSyAjBZlR_r69qAkyPq2Ww0JBaY7F9HSdhpc
      - key: VITE_FIREBASE_AUTH_DOMAIN
        value: sentinel-signals.firebaseapp.com
      - key: VITE_FIREBASE_PROJECT_ID
        value: sentinel-signals
      - key: VITE_FIREBASE_STORAGE_BUCKET
        value: sentinel-signals.firebasestorage.app
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        value: "9439557541"
      - key: VITE_FIREBASE_APP_ID
        value: "1:9439557541:web:f92e49ade6d2e69f0dda4c"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# server/ (sentinel-signals-api) is not deployed here — Telegram is
# configured directly in the browser for now (see TelegramSettings.jsx).
# The server/ backend is kept for when the Strategy Reviewer AI chat needs
# a place to hold its API key; add its service block back to this file
# when that's picked up again.
